<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusionfitgym</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-black via-gray-900 to-purple-900 flex items-center justify-center p-6">

    <!-- Background Blur -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute top-20 left-20 w-72 h-72 bg-purple-500 rounded-full blur-3xl opacity-20"></div>
        <div class="absolute bottom-20 right-20 w-72 h-72 bg-pink-500 rounded-full blur-3xl opacity-20"></div>
    </div>

    <!-- Card -->
    <div class="relative z-10 max-w-2xl w-full">
        <div class="backdrop-blur-xl bg-white/10 border border-white/20 rounded-3xl p-10 text-center shadow-2xl">

            <span class="inline-block px-4 py-2 bg-purple-500/20 text-purple-300 rounded-full text-sm mb-6">
                🚀 Launching Soon
            </span>

            <h1 class="text-5xl md:text-7xl font-extrabold text-white mb-6">
                Something Amazing
                <span class="bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                    is Coming
                </span>
            </h1>

            <p class="text-gray-300 text-lg mb-8">
                We're working hard to bring you an incredible experience.
                Stay tuned for the official launch.
            </p>

            <!-- Email Form -->
            <div class="flex flex-col sm:flex-row gap-4 max-w-lg mx-auto">
                <input
                    type="email"
                    placeholder="Enter your email"
                    class="flex-1 px-5 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-gray-400 outline-none"
                />
                <button
                    class="px-6 py-3 rounded-xl bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold hover:scale-105 transition"
                >
                    Notify Me
                </button>
            </div>

            <!-- Footer -->
            <div class="mt-10 text-gray-400 text-sm">
                © 2026 Fusionfitgym. All Rights Reserved.
            </div>

        </div>
    </div>

</body>
</html>
